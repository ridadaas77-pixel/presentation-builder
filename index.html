<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>2-Minuten Präsentation Builder</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <h1>2-Minuten Präsentation Builder</h1>
  <p>In Sekunden ne Struktur für deine Präsentation erstellen – locker und easy.</p>
</div>

<div class="card">
  <input type="text" id="topic" placeholder="Über welches Thema soll’s gehen?">

  <select id="level">
    <option value="5">5. Klasse</option>
    <option value="6">6. Klasse</option>
    <option value="7">7. Klasse</option>
    <option value="8">8. Klasse</option>
    <option value="9">9. Klasse</option>
    <option value="10">10. Klasse</option>
    <option value="EF">EF (11. Klasse)</option>
    <option value="Q1">Q1 (12. Klasse)</option>
    <option value="Q2">Q2 (13. Klasse)</option>
  </select>

  <select id="duration">
    <option>5 Minuten</option>
    <option>10 Minuten</option>
    <option>15 Minuten</option>
  </select>

  <button id="generateBtn">Präsentation generieren</button>
</div>

<div id="output"></div>

<footer>
  © 2026 LVLstudys
</footer>

<script src="script.js"></script>
</body>
</html>
