<!DOCTYPE html>
<html>
<head>
  <title>2-Minute Presentation Builder</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      width: 400px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #22c55e;
      border: none;
      border-radius: 6px;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background-color: #16a34a;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>2-Minute Presentation Builder</h1>

  <input type="text" placeholder="Topic">
  
  <select>
    <option>Grade 5</option>
    <option>Grade 8</option>
    <option>Grade 10</option>
    <option>Grade 12</option>
  </select>

  <select>
    <option>5 Minutes</option>
    <option>10 Minutes</option>
    <option>15 Minutes</option>
  </select>

  <button>Generate Presentation</button>
</div>

</body>
</html>
